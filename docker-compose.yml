services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    depends_on:
      - db
    environment:
      DB_HOST: db

  queue-worker:
    build: .
    command: php artisan queue:work --tries=3
    volumes:
      - .:/var/www
    depends_on:
      - db
    environment:
      DB_HOST: db

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: pharmacera
      MYSQL_USER: pharmacera
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: